# Per-category intro paragraphs, keyed by category slug.
# Emitted under each tier heading by scripts/gen_awesome_readme.py.

tier-s: >
  The single distro built around the actual demands of a 2026 AI
  workstation. NVIDIA driver updates land in hours, the kernel is
  tuned and rolling, packages are compiled for modern x86, and
  btrfs + snapshots give you a 30-second rollback when something
  goes sideways. If you only read one tier of this list, read this
  one.

tier-a: >
  No "Winner" status, but if you are happy to spend a weekend
  configuring the machine, you get the best long-term ergonomics
  outside of Tier S — current packages, the best wiki in Linux, and
  AUR recipes for every CUDA / NVIDIA / ROCm release. Setup is the
  cost of admission.

tier-b: >
  These distros will run AI workloads, but each has a known friction
  point you will hit within the first week: SELinux + container
  permissions, an in-development desktop, or a snap-and-Pro upsell
  pipeline that ships with the system. Workable, with eyes open.

tier-c: >
  Positioned for a different use case — set-and-forget servers,
  identical-fleet reproducibility, or Windows-refugee onboarding —
  and wrong for an AI workstation in 2026 specifically. Each one is
  still a great Linux distro for its actual job; just not this one.

tier-snub: >
  Distros Nova called out by name in the episode's Snub Round. Pretty,
  themed, or basically Arch with a coat of paint. Listed for
  completeness; not recommended for the AI workstation role.
